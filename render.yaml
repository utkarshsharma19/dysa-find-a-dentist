services:
  - type: web
    name: dysa-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: |
      corepack enable
      corepack prepare pnpm@10.30.1 --activate
      pnpm install --frozen-lockfile
      pnpm turbo run build --filter=@dysa/api
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: RUN_WORKER_INLINE
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://dysaai.com
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
